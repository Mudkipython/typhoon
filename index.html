<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#eaf5f8" />
  <title>Typhoon Vision · 全球热带气旋</title>
  <meta name="description" content="全球热带气旋路径、风圈、城市影响、云量与降水可视化。" />
  <link rel="preconnect" href="https://a.basemaps.cartocdn.com" />
  <link href="./vendor/maplibre-gl.css" rel="stylesheet" />
  <link href="./styles.css" rel="stylesheet" />
</head>
<body>
  <header class="topbar">
    <button class="brand" id="brandButton" type="button" aria-label="打开气旋列表">
      <span class="brand-mark" aria-hidden="true">◔</span>
      <span class="brand-copy"><strong>Typhoon Vision <span class="version-pill">Public v17</span></strong><small data-i18n="tagline">全球热带气旋与个人影响</small></span>
    </button>
    <div class="source-health" id="sourceHealth" role="status"><i></i><span><strong data-i18n="connecting">正在连接权威来源</strong><small id="sourceUpdated">—</small></span></div>
    <nav class="top-actions">
      <button class="header-button" id="languageButton" type="button">🌐 <span id="languageLabel">中文</span></button>
      <button class="header-button" id="themeButton" type="button">☼ <span data-i18n="appearance">外观</span></button>
    </nav>
  </header>

  <main class="app-shell">
    <section class="map-stage" aria-label="全球热带气旋地图">
      <div id="map"></div>
      <canvas id="cycloneCanvas" aria-hidden="true"></canvas>

      <div class="map-actions map-actions-left">
        <button class="map-button" id="systemsButton" type="button">☰ <span data-i18n="systems">气旋</span></button>
        <button class="storm-chip" id="stormChip" type="button"><i></i><span><strong id="chipName">—</strong><small id="chipMeta">—</small></span></button>
      </div>

      <div class="map-actions map-actions-center">
        <button class="map-button" id="focusButton" type="button">⌖ <span data-i18n="focus">聚焦</span></button>
        <button class="map-button" id="layersButton" type="button">◈ <span data-i18n="layers">图层</span></button>
      </div>

      <div class="map-actions map-actions-right">
        <button class="map-button" id="detailsButton" type="button"><span data-i18n="details">详情</span> ☷</button>
      </div>

      <aside class="drawer systems-drawer" id="systemsDrawer" aria-hidden="true">
        <header class="drawer-header"><div><span class="eyebrow" data-i18n="activeSystems">活跃系统</span><h2><span id="stormCount">0</span> <span data-i18n="systemsWorldwide">个全球系统</span></h2></div><button class="close-button" data-close="systemsDrawer">×</button></header>
        <div class="basin-tabs" id="basinTabs"></div>
        <div class="storm-list" id="stormList"></div>
        <label class="demo-toggle"><input id="demoToggle" type="checkbox" /><span><strong data-i18n="showDemo">显示演示系统</strong><small data-i18n="demoExplain">没有官方活动系统时用于体验功能</small></span></label>
        <section class="authority-card"><span class="eyebrow" data-i18n="authority">所属权威机构</span><h3 id="agencyName">—</h3><p id="agencyDescription">—</p><a id="agencyLink" target="_blank" rel="noreferrer" data-i18n="officialSite">官网 ↗</a></section>
      </aside>

      <aside class="drawer details-drawer" id="detailsDrawer" aria-hidden="true">
        <header class="drawer-header"><div><span class="eyebrow" data-i18n="publicBrief">公众简报</span><h2 id="detailsTitle">—</h2></div><button class="close-button" data-close="detailsDrawer">×</button></header>
        <div class="drawer-scroll">
          <section class="brief-card"><p id="briefText">—</p><div class="brief-grid"><div><span data-i18n="direction">移动方向</span><strong id="briefDirection">—</strong></div><div><span data-i18n="maxWind">最大风速</span><strong id="briefWind">—</strong></div><div><span data-i18n="pressure">中心气压</span><strong id="briefPressure">—</strong></div><div><span data-i18n="updated">更新时间</span><strong id="briefUpdated">—</strong></div></div></section>

          <section class="detail-section"><div class="section-heading"><span class="eyebrow" data-i18n="personalImpact">个人影响</span><h3 data-i18n="whatMeans">这对我意味着什么？</h3></div><div class="location-card"><strong id="locationStatus" data-i18n="locationNotSet">尚未设置</strong><div class="location-actions"><button id="locateButton" type="button" data-i18n="useLocation">使用定位</button><button id="pickLocationButton" type="button" data-i18n="pickOnMap">地图点选</button><button id="clearLocationButton" type="button" data-i18n="clear">清除</button></div></div><div class="impact-grid"><div><span data-i18n="nearestDistance">距路径最近</span><strong id="nearestDistance">—</strong></div><div><span data-i18n="closestTime">预计最接近</span><strong id="closestTime">—</strong></div><div><span data-i18n="impactWindow">可能影响时段</span><strong id="impactWindow">—</strong></div><div><span data-i18n="confidence">估算可信度</span><strong id="confidence">—</strong></div></div><div id="hazardList" class="hazard-list"></div></section>

          <section class="detail-section"><div class="section-heading"><span class="eyebrow" data-i18n="historicalReference">历史参考</span><h3 data-i18n="similarCyclones">相似气旋</h3></div><p class="muted" data-i18n="historyDisclaimer">历史相似仅用于理解风险，不代表本次结果相同。</p><div id="analogCards" class="analog-list"></div></section>

          <section class="detail-section"><div class="section-heading"><span class="eyebrow" data-i18n="professionalData">专业数据</span><h3 data-i18n="dataSources">数据与来源</h3></div><dl class="pro-grid"><div><dt data-i18n="coordinates">中心坐标</dt><dd id="proCoordinates">—</dd></div><div><dt data-i18n="classification">强度分类</dt><dd id="proClass">—</dd></div><div><dt data-i18n="trackPoints">路径节点</dt><dd id="proTrackPoints">—</dd></div><div><dt data-i18n="primaryAgency">主权威机构</dt><dd id="proAgency">—</dd></div></dl><div id="sourceList" class="source-list"></div><div id="regionalTools" class="regional-tools"></div></section>
        </div>
      </aside>

      <aside class="layer-panel" id="layerPanel" hidden>
        <header><div><span class="eyebrow" data-i18n="mapLayers">地图图层</span><h3 data-i18n="weatherLayers">气象与风险图层</h3></div><button class="close-button" data-close="layerPanel">×</button></header>
        <label><input type="checkbox" data-layer="cyclone" checked /><span><strong data-i18n="cycloneStructure">气旋结构</strong><small data-i18n="cycloneStructureNote">按风速、气压和风圈绘制</small></span></label>
        <label><input type="checkbox" data-layer="track" checked /><span><strong data-i18n="trackLayer">路径与节点</strong><small data-i18n="trackLayerNote">实况、官方预报和趋势参考</small></span></label>
        <label><input type="checkbox" data-layer="wind" checked /><span><strong data-i18n="windLayer">风圈</strong><small data-i18n="windLayerNote">无官方半径时明确标记估算</small></span></label>
        <label><input type="checkbox" data-layer="cities" checked /><span><strong data-i18n="cityLayer">主要城市</strong><small data-i18n="cityLayerNote">底图不显示国家标签</small></span></label>
        <label><input type="checkbox" data-layer="cloud" /><span><strong data-i18n="cloudLayer">云量</strong><small>Open-Meteo</small></span></label>
        <label><input type="checkbox" data-layer="precip" /><span><strong data-i18n="precipLayer">降水</strong><small>Open-Meteo</small></span></label>
        <p class="layer-note" data-i18n="weatherNote">云量和降水来自数值天气模式，不是地面雷达回波。区域官方雷达入口位于详情页。</p>
      </aside>

      <div class="weather-status" id="weatherStatus" hidden><i></i><span><strong id="weatherStatusTitle">—</strong><small id="weatherStatusText">—</small></span><button id="weatherStatusClose">×</button></div>

      <div class="map-legend" id="mapLegend">
        <span><i class="legend-line observed"></i><b data-i18n="observed">实况</b></span>
        <span><i class="legend-line forecast"></i><b data-i18n="forecast">官方预报</b></span>
        <span><i class="legend-line trend"></i><b data-i18n="trend">趋势参考</b></span>
        <span><i class="legend-ring"></i><b data-i18n="windArea">风圈</b></span>
      </div>

      <div class="timeline" id="timeline">
        <button class="play-button" id="playButton" type="button" aria-label="播放">▶</button>
        <div class="timeline-main"><div class="timeline-labels"><strong id="timelineTime">—</strong><small id="timelineKind">—</small></div><input id="timelineRange" type="range" min="0" max="1000" value="0" /></div>
        <button class="speed-button" id="speedButton" type="button">1×</button>
      </div>
    </section>
  </main>

  <div class="menu-popover" id="languageMenu" hidden>
    <button data-language="zh">简体中文</button><button data-language="en">English</button><button data-language="ja">日本語</button><button data-language="ko">한국어</button><button data-language="es">Español</button><button data-language="fr">Français</button>
  </div>
  <div class="menu-popover" id="themeMenu" hidden><button data-theme-choice="system" data-i18n="themeSystem">跟随系统</button><button data-theme-choice="light" data-i18n="themeLight">浅色</button><button data-theme-choice="dark" data-i18n="themeDark">深色</button></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="./vendor/maplibre-gl.js"></script>
  <script src="./cyclone-viz.js"></script>
  <script src="./app.js"></script>
</body>
</html>
